<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Маршрут №11 — з-д «Прожектор»</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* Редагуй ці змінні для зміни дизайну */
    :root {
      --accent: #00A86B;
      --accent-dark: #007a47;
      --text: #1a1a1a;
      --text-muted: #4a4a4a;
      --bg: #ffffff;
      --border: #e0e0e0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: #f0f0f0;
      padding: 24px;
      color: var(--text);
    }

    /* Папір A4 для друку */
    .sign {
      max-width: 210mm;
      margin: 0 auto;
      background: var(--bg);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .sign-inner {
      padding: 32px 40px 28px;
      border: 3px solid var(--accent);
      border-radius: 12px;
      margin: 12px;
    }

    .sign-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border);
    }

    .sign-title-block {
      flex: 1;
    }

    .sign-route {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .sign-stop {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
    }

    .sign-direction {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 14px;
      background: var(--accent);
      color: white;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
    }

    .sign-direction::before {
      content: '→';
      font-size: 1.1em;
    }

    .sign-qr {
      flex-shrink: 0;
      padding: 12px;
      background: white;
      border: 2px solid var(--border);
      border-radius: 10px;
    }

    .sign-qr img {
      display: block;
      width: 120px;
      height: 120px;
    }

    .sign-qr-caption {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
    }

    .sign-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .sign-operator {
      opacity: 0.85;
    }

    /* Друк */
    @media print {
      body {
        background: white;
        padding: 0;
      }
      .sign {
        box-shadow: none;
        max-width: none;
      }
      .sign-inner {
        margin: 0;
        border-width: 2px;
      }
    }

    @page {
      size: A4;
      margin: 15mm;
    }
  </style>
</head>
<body>
  <div class="sign">
    <div class="sign-inner">
      <div class="sign-header">
        <div class="sign-title-block">
          <div class="sign-route">Маршрутне таксі №11</div>
          <div class="sign-stop">Зупинка «Прожектор»</div>
          <div class="sign-direction">Напрямок на Вокзал</div>
        </div>
        <div class="sign-qr">
          <!-- dir=there = на Вокзал. Для "на Паперову фабрику" зміни dir=there на dir=back -->
<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https%3A%2F%2Fmalin.kiev.ua%2Flocaltransport%2Froute%2F11%3Fstop%3D%D0%B7-%D0%B4%20%22%D0%9F%D1%80%D0%BE%D0%B6%D0%B5%D0%BA%D1%82%D0%BE%D1%80%22%26dir%3Dthere" alt="QR-код розкладу" width="120" height="120">
          <div class="sign-qr-caption">Відскануй для розкладу</div>
        </div>
      </div>
      <div class="sign-footer">
        <span class="sign-operator">Розклад на malin.kiev.ua</span>
      </div>
    </div>
  </div>
</body>
</html>
